<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskGrid GS - {% block title %}Dashboard{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1419; color: #e1e8ed; font-size: 14px; line-height: 1.5;
      display: flex; min-height: 100vh;
    }
    a { color: #1d9bf0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .sidebar {
      width: 220px; background: #1a1f2e; padding: 20px 0;
      display: flex; flex-direction: column; flex-shrink: 0;
      border-right: 1px solid #2a3040;
    }
    .sidebar .logo { padding: 0 20px 20px; font-size: 18px; font-weight: 700; color: #fff; border-bottom: 1px solid #2a3040; }
    .sidebar .logo span { color: #1d9bf0; }
    .sidebar nav { padding: 10px 0; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; color: #8899a6; font-size: 14px;
      border-left: 3px solid transparent; transition: all 0.15s;
    }
    .sidebar nav a:hover, .sidebar nav a.active { color: #fff; background: #252b3d; text-decoration: none; }
    .sidebar nav a.active { border-left-color: #1d9bf0; }
    .sidebar nav a .icon { width: 20px; text-align: center; font-size: 16px; }
    .main { flex: 1; padding: 24px 32px; max-width: 1200px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 20px; color: #fff; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    .card { background: #1a1f2e; border: 1px solid #2a3040; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .card-title { font-size: 13px; color: #8899a6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .card-value { font-size: 28px; font-weight: 700; color: #fff; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 12px; font-weight: 600; text-transform: uppercase;
    }
    .badge-pending { background: #2a3040; color: #8899a6; }
    .badge-running { background: #1a5a8a; color: #7bc9ff; }
    .badge-success { background: #1a5a3a; color: #7ae9a0; }
    .badge-failed { background: #5a1a1a; color: #ff7b7b; }
    .badge-cancelled { background: #3a2a1a; color: #ffb07b; }
    .badge-timeout { background: #3a1a3a; color: #d07bff; }
    .badge-online { background: #1a5a3a; color: #7ae9a0; }
    .badge-offline { background: #3a1a1a; color: #ff7b7b; }
    .badge-running-ge { background: #1a5a8a; color: #7bc9ff; }
    .badge-high { background: #5a1a1a; color: #ff7b7b; }
    .badge-medium { background: #2a3040; color: #8899a6; }
    .badge-low { background: #1a3a2a; color: #7ae9a0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #2a3040; }
    th { color: #8899a6; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    td { font-size: 14px; }
    tr:hover td { background: #252b3d; }
    .clickable { cursor: pointer; }
    .btn {
      display: inline-block; padding: 8px 16px; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      transition: all 0.15s; text-decoration: none;
    }
    .btn-primary { background: #1d9bf0; color: #fff; }
    .btn-primary:hover { background: #1a8cd8; text-decoration: none; }
    .btn-danger { background: #b22222; color: #fff; }
    .btn-danger:hover { background: #8b1a1a; text-decoration: none; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 4px; color: #8899a6; font-size: 13px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 8px 12px; background: #0f1419; border: 1px solid #2a3040;
      border-radius: 6px; color: #e1e8ed; font-size: 14px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #1d9bf0; }
    .form-group textarea { font-family: monospace; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-section { margin-bottom: 24px; }
    .detail-section h3 { font-size: 14px; color: #8899a6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2a3040; }
    .detail-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; }
    .detail-grid .label { color: #8899a6; font-size: 13px; white-space: nowrap; }
    .detail-grid .value { color: #e1e8ed; font-size: 14px; word-break: break-all; }
    .empty { text-align: center; padding: 40px; color: #8899a6; }
    .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { padding: 6px 10px; background: #0f1419; border: 1px solid #2a3040; border-radius: 4px; color: #e1e8ed; font-size: 13px; }
    .pagination { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 16px; }
    .pagination a { padding: 6px 12px; border: 1px solid #2a3040; border-radius: 4px; font-size: 13px; }
    .pagination a:hover { background: #252b3d; text-decoration: none; }
    .pagination .current { padding: 6px 12px; color: #8899a6; }
    .toast { position: fixed; top: 16px; right: 16px; padding: 12px 20px; border-radius: 6px; color: #fff; font-weight: 600; z-index: 1000; display: none; }
    .toast.error { background: #b22222; }
    .toast.success { background: #1a5a3a; }
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar .logo span, .sidebar nav a span { display: none; }
      .main { padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">Task<span>Grid</span></div>
    <nav>
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
        <span class="icon">&#9632;</span><span>Dashboard</span>
      </a>
      <a href="/tasks" class="{% if request.url.path.startswith('/tasks') %}active{% endif %}">
        <span class="icon">&#9776;</span><span>Tasks</span>
      </a>
      <a href="/ges" class="{% if request.url.path.startswith('/ges') %}active{% endif %}">
        <span class="icon">&#9679;</span><span>Executors</span>
      </a>
      <a href="/packages" class="{% if request.url.path.startswith('/packages') %}active{% endif %}">
        <span class="icon">&#9633;</span><span>Packages</span>
      </a>
    </nav>
  </div>
  <div class="main">
    <div id="toast" class="toast"></div>
    {% block content %}{% endblock %}
  </div>
  <script>
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
      setTimeout(function(){ t.style.display = 'none'; }, 4000);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
