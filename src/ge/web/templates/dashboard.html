<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GE Local Web UI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1419; color: #e1e8ed; font-size: 14px; line-height: 1.5;
      padding: 24px 32px; max-width: 1200px; margin: 0 auto;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 20px; color: #fff; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    .card {
      background: #1a1f2e; border: 1px solid #2a3040; border-radius: 8px;
      padding: 16px; margin-bottom: 16px;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat {
      background: #1a1f2e; border: 1px solid #2a3040; border-radius: 8px;
      padding: 16px; text-align: center;
    }
    .stat .label { font-size: 12px; color: #8899a6; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat .value { font-size: 28px; font-weight: 700; color: #fff; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #2a3040; }
    th { color: #8899a6; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    td { font-size: 14px; }
    tr:hover td { background: #252b3d; }
    .clickable { cursor: pointer; }
    a { color: #1d9bf0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 12px; font-weight: 600; text-transform: uppercase;
    }
    .badge-running { background: #1a5a8a; color: #7bc9ff; }
    .badge-success { background: #1a5a3a; color: #7ae9a0; }
    .badge-failed { background: #5a1a1a; color: #ff7b7b; }
    .badge-cancelled { background: #3a2a1a; color: #ffb07b; }
    .badge-timeout { background: #3a1a3a; color: #d07bff; }
    .badge-unknown { background: #2a3040; color: #8899a6; }
    .empty { text-align: center; padding: 40px; color: #8899a6; }
    .progress { color: #1d9bf0; font-size: 12px; margin-left: 8px; }
  </style>
</head>
<body>
  <h1>GE Local Web UI</h1>

  <div class="stats-grid" id="statusGrid">
    <div class="stat"><div class="label">GE ID</div><div class="value" id="geId" style="font-size:16px;">-</div></div>
    <div class="stat"><div class="label">State</div><div class="value" id="geState">-</div></div>
    <div class="stat"><div class="label">Slots</div><div class="value" id="geSlots">-</div></div>
    <div class="stat"><div class="label">Pool</div><div class="value" id="gePool" style="font-size:16px;">-</div></div>
  </div>

  <h2>Tasks</h2>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Status</th>
          <th>Duration</th>
          <th>Started</th>
        </tr>
      </thead>
      <tbody id="taskList">
      </tbody>
    </table>
  </div>

  <script>
    function loadStatus() {
      fetch('/api/status').then(function(r) { return r.json(); }).then(function(s) {
        document.getElementById('geId').textContent = s.ge_id;
        document.getElementById('geState').textContent = s.state;
        document.getElementById('geSlots').textContent = s.used_slots + '/' + s.total_slots;
        document.getElementById('gePool').textContent = s.pool || '-';
      }).catch(function() {});
    }

    function loadTasks() {
      fetch('/api/tasks').then(function(r) { return r.json(); }).then(function(tasks) {
        var tbody = document.getElementById('taskList');
        if (!tasks || tasks.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4"><div class="empty">No tasks</div></td></tr>';
          return;
        }
        tbody.innerHTML = '';
        tasks.forEach(function(t) {
          var tr = document.createElement('tr');
          tr.className = 'clickable';
          tr.addEventListener('click', function() { window.location.href = '/tasks/' + t.task_id; });
          tr.innerHTML =
            '<td>' + t.task_id + '</td>' +
            '<td><span class="badge badge-' + t.status + '">' + t.status + '</span>' +
              (t.progress ? '<span class="progress">' + t.progress + '</span>' : '') + '</td>' +
            '<td>' + (t.duration != null ? t.duration + 's' : '-') + '</td>' +
            '<td>' + (t.start_time ? t.start_time.slice(0, 19) : '-') + '</td>';
          tbody.appendChild(tr);
        });
      }).catch(function() {});
    }

    loadStatus();
    loadTasks();
    setInterval(loadStatus, 3000);
    setInterval(loadTasks, 3000);
  </script>
</body>
</html>
